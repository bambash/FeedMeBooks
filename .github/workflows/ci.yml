name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # TypeScript type check
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────
  # Android debug APK — no signing required
  # Runs fast on every push/PR as a build-health sanity check.
  # ──────────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # expo-modules-core bundled with Expo SDK 51 contains a maven-publish block
      # that accesses components.release, which AGP 8.3+ never registers for
      # subprojects in this build context. The block is only needed for publishing
      # expo as a Maven artifact — not for building APKs — so we remove it entirely.
      - name: Patch ExpoModulesCorePlugin.gradle (remove broken maven-publish block)
        run: |
          python3 - <<'EOF'
          import pathlib
          f = pathlib.Path('node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle')
          content = f.read_text()
          # Use brace-counting to precisely remove the project.afterEvaluate block
          # that accesses components.release. The block is only used for Maven
          # publishing and is not needed to build APKs.
          marker = '\n  project.afterEvaluate {'
          start = content.find(marker)
          if start == -1:
              print('Marker not found - patch may already be applied'); exit(0)
          depth, i, end = 0, start + 1, -1
          while i < len(content):
              if content[i] == '{': depth += 1
              elif content[i] == '}':
                  depth -= 1
                  if depth == 0:
                      end = i + 1
                      break
              i += 1
          patched = content[:start] + content[end:]
          f.write_text(patched)
          print('Patch applied. components.release present:', 'components.release' in patched)
          EOF

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: |
            android/
            .expo/
          key: expo-prebuild-android-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: expo-prebuild-android-

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: feedmebooks-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
