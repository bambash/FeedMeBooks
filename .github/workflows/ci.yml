name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # TypeScript type check
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────
  # Android debug APK — no signing required
  # Runs fast on every push/PR as a build-health sanity check.
  # ──────────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # expo-modules-core ≤1.12.21 accesses `components.release` inside a single
      # `afterEvaluate`, which is too early for AGP 8.3+ to have registered the
      # component. Wrapping it in a second `afterEvaluate` defers the lookup
      # until the component exists. This patch is applied to node_modules in CI
      # because we cannot change the upstream package without upgrading Expo SDK.
      - name: Patch ExpoModulesCorePlugin.gradle (components.release timing fix)
        run: |
          sed -i \
            's/from components\.release/afterEvaluate { from components.release }/' \
            node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: |
            android/
            .expo/
          key: expo-prebuild-android-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: expo-prebuild-android-

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: feedmebooks-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
