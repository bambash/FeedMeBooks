name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # TypeScript type check
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────
  # Android debug APK — no signing required
  # Runs fast on every push/PR as a build-health sanity check.
  # ──────────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # expo-modules-core <=1.12.21 contains a maven-publish block (lines 81-94)
      # that accesses components.release, which AGP 8.3+ never registers for
      # subprojects. The block is only needed for Maven publishing, not APK builds.
      # package-lock.json pins the exact version so line numbers are stable.
      - name: Patch ExpoModulesCorePlugin.gradle (remove broken maven-publish block)
        run: |
          FILE=node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
          sed -i '81,94d' "$FILE"
          echo "Patch applied. Remaining references to components.release:"
          grep -c 'components\.release' "$FILE" || echo "0 (clean)"

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: |
            android/
            .expo/
          key: expo-prebuild-android-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: expo-prebuild-android-

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      # Inject bundleInDebug = true into the react {} block so Gradle runs the
      # JS bundler and embeds index.android.bundle into the APK. Without this
      # the debug APK tries to connect to a Metro dev server at runtime.
      - name: Patch app/build.gradle to embed JS bundle
        run: |
          sed -i 's/^react {/react {\n    bundleInDebug = true/' android/app/build.gradle
          echo "react block after patch:"
          grep -A3 "^react {" android/app/build.gradle

      # Pre-bundle JS explicitly — bundleInDebug alone is not reliably picked
      # up by the RN 0.74 Gradle plugin. Running expo export:embed ahead of
      # Gradle guarantees index.android.bundle lands in src/main/assets and
      # gets included in the APK as a static asset.
      - name: Bundle JS for Android (expo export:embed)
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --dev false \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache
          echo "Bundle size: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: feedmebooks-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
